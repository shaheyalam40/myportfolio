 <style>

@keyframes runbanner
{
    10%{left:0%;}

    20%{left:-19%;}

    50%{left:-38%;}
    
    60%{left:-57%;}
    70%{left:-57%;}

    80%{left:-76%;}
    90%{left:-76%;}
}

}
