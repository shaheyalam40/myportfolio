<body>

    <script>
        // for loop 
        // break
        //continue
        var n = prompt("enter a number to create table","2")
        document.write("<h1>table of = "+n+" </h1>")
            for (var i = 1;i<=10;i++)
        {
            document.write("<h1> "+n+" * "+i+" = "+n*i+"</h1> ")
        }
        document.write("Loop End ")
    </script>
