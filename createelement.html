<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .btnb {
  color: black;
  text-decoration: none;
  cursor: pointer;
  display: block;
  margin-left: 40px;
  margin-top: 20px;
}

</style>
<body>
    <a class="btnb" href="jsprac.html">⬅ Back</a>
    <h1>creating tag by javascript </h1>
    <script>

        var p = document.createElement("img")
        document.body.appendChild(p)
        p.src="photo/coffee.jpg"
        p.style="transition:0.50s;margin:20px; border-radius:10px;cursor:pointer;"
        document.title="no error"
        p.style.width="30%"
        p.style.boxShadow="10px 10px 10px gray "

        p.onclick=function()
        {
            p.src="photo/bmw.jpg"
        }
        p.onmouseout=function()
        {
           p.src="photo/coffee.jpg"  
           p.style.transform="scale(1)"
        }
        p.onmouseover= function()
        {
            this.style.transform="scale(1.10)"
        }

    </script>    
</body>
</html>
